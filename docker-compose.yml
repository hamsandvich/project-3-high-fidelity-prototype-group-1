version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vocabulary_explorer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vocabulary_explorer?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ADMIN_ACCESS_CODE: altlab-admin
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
